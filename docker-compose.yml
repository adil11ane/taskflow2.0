networks:
  dev:

services:
  # 1. БАЗА ДАННЫХ POSTGRESQL (Скачивается автоматически)
  postgres_db:
    image: postgres:15-alpine
    container_name: learning_postgres
    restart: always
    env_file:
      - .env  # Берет POSTGRES_DB, USER и PASSWORD из вашего файла .env
    volumes:
      - pg_data:/var/lib/postgresql/data  # Данные пользователей сохраняются на жесткий диск
    ports:
      - "5432:5432" # Открываем порт, чтобы вы могли подключиться через DBeaver / DataGrip
    networks:
      - dev

  # 2. КЭШ И АВТОРИЗАЦИЯ REDIS (Скачивается автоматически)
  redis_cache:
    image: redis:7-alpine
    container_name: learning_redis
    restart: always
    ports:
      - "6379:6379" # Открываем порт для тестов, если нужно заглянуть внутрь Redis
    networks:
      - dev

  # 3. БЭКЕНД НА DJANGO
  backend:
    build:
      context: ./backend        # Указывает на папку backend
      dockerfile: Dockerfile     # Собирает ваш Python-образ по инструкции из Dockerfile
    container_name: learning_backend
    restart: always
    env_file:
      - .env                    # Пробрасывает DATABASE_URL, REDIS_URL и SECRET_KEY
    volumes:
      - ./backend:/app          # Монтирует код для автообновления (горячая перезагрузка при разработке)
    depends_on:
      - postgres_db             # Django ждет полного запуска базы данных
      - redis_cache             # Django ждет полного запуска кэша
    networks:
      - dev
      

  # 4. ФРОНТЕНД (HTML/CSS/JS)
  frontend:
  build:
    context: ./frontend
    dockerfile: Dockerfile
  container_name: taskflow_frontend
  restart: always
  networks:
    - dev

  # 5. ГЛАВНЫЙ ВХОДНОЙ ШЛЮЗ (Nginx)
  gateway:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx_gateway
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf/def.config:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    networks:
      - dev

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - dev

# ОБЪЯВЛЯЕМ ПОСТОЯННЫЙ ТОМ ДЛЯ ХРАНЕНИЯ ДАННЫХ POSTGRESQL
volumes:
  pg_data:
