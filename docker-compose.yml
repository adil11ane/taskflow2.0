networks:
  dev:

services:

  postgres_db:
    image: postgres:15-alpine
    container_name: learning_postgres
    restart: always
    env_file:
      - .env 
    volumes:
      - pg_data:/var/lib/postgresql/data 
    ports:
      - "5432:5432" 
    networks:
      - dev

 
  redis_cache:
    image: redis:7-alpine
    container_name: learning_redis
    restart: always
    ports:
      - "6379:6379" 
    networks:
      - dev


  backend:
    build:
      context: ./backend        
      dockerfile: Dockerfile    
    container_name: learning_backend
    restart: always
    env_file:
      - .env                   
    volumes:
      - ./backend:/app         
    depends_on:
      - postgres_db             
      - redis_cache          
    networks:
      - dev
      


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskflow_frontend
    restart: always
    networks:
      - dev
      
  
  gateway:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx_gateway
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf/def.config:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    networks:
      - dev

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - dev

volumes:
  pg_data:
