<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TaskFlow — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="/css/index.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="js/index.js" defer></script>
<style>
  /* Step panels inside register */
  .step-panel { display: none; }
  .step-panel.active { display: block; }

  /* Back button */
  .btn-back {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    padding: 0;
    margin-bottom: 20px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: color 0.2s;
  }
  .btn-back:hover { color: var(--text); }
  .btn-back svg { width: 14px; height: 14px; }

  /* Code input */
  .code-hint {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .code-hint strong {
    color: var(--accent);
    font-weight: 500;
  }

  #reg-code {
    letter-spacing: 6px;
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    font-family: 'Syne', sans-serif;
  }

  /* Resend link */
  .resend-row {
    text-align: center;
    margin-top: 14px;
  }
  #resend-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    padding: 0;
    transition: opacity 0.2s;
  }
  #resend-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #resend-btn:hover:not(:disabled) { text-decoration: underline; }
</style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="grid-overlay"></div>

<div class="auth-container">
  <div class="brand">
    <div class="brand-logo">
      <div class="brand-dot"></div>
      TaskFlow
    </div>
    <div class="brand-tagline">Projects · Tasks · Comments — all in one place</div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('register')">Sign Up</button>
    </div>

    <!-- ═══ LOGIN PANEL ═══ -->
    <div class="form-panel active" id="panel-login">
      <div class="form-title">Welcome back</div>
      <div class="form-subtitle">Sign in to your account</div>
      <div class="alert error" id="login-error"></div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn-primary" id="login-btn" onclick="doLogin()">Sign In</button>
    </div>

    <!-- ═══ REGISTER PANEL ═══ -->
    <div class="form-panel" id="panel-register">
      <div class="alert error" id="register-error"></div>
      <div class="alert success" id="register-success"></div>

      <!-- STEP 1: fill in details -->
      <div class="step-panel active" id="register-step-1">
        <div class="form-title">Create account</div>
        <div class="form-subtitle">Free forever, no credit card needed</div>
        <div class="field-row">
          <div class="field">
            <label>First Name</label>
            <input type="text" id="reg-first" placeholder="Alex"/>
          </div>
          <div class="field">
            <label>Last Name</label>
            <input type="text" id="reg-last" placeholder="Smith"/>
          </div>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email"/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Min 8 characters" autocomplete="new-password"/>
        </div>
        <button class="btn-primary" id="request-code-btn" onclick="doRequestCode()">Send Confirmation Code</button>
      </div>

      <!-- STEP 2: enter code -->
      <div class="step-panel" id="register-step-2">
        <button class="btn-back" onclick="showRegisterStep(1)">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Back
        </button>
        <div class="form-title">Check your email</div>
        <p class="code-hint">
          We sent a 6-character code to<br/>
          <strong id="code-email-hint"></strong>
        </p>
        <div class="field">
          <label>Confirmation Code</label>
          <input
            type="text"
            id="reg-code"
            placeholder="A1B2C3"
            maxlength="6"
            autocomplete="one-time-code"
            oninput="this.value = this.value.toUpperCase()"
          />
        </div>
        <button class="btn-primary" id="confirm-code-btn" onclick="doConfirmCode()">Confirm & Create Account</button>
        <div class="resend-row">
          <button id="resend-btn" onclick="doResendCode()">Resend code</button>
        </div>
      </div>

    </div><!-- /panel-register -->
  </div><!-- /card -->
</div>

</body>
</html>
