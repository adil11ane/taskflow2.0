<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TaskFlow — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="/css/index.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="js/index.js" defer></script>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="grid-overlay"></div>

<div class="auth-container">
  <div class="brand">
    <div class="brand-logo">
      <div class="brand-dot"></div>
      TaskFlow
    </div>
    <div class="brand-tagline">Projects · Tasks · Comments — all in one place</div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('register')">Sign Up</button>
    </div>

    <!-- LOGIN PANEL -->
    <div class="form-panel active" id="panel-login">
      <div class="form-title">Welcome back</div>
      <div class="form-subtitle">Sign in to your account</div>
      <div class="alert error" id="login-error"></div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn-primary" id="login-btn" onclick="doLogin()">Sign In</button>
    </div>

    <!-- REGISTER PANEL -->
    <div class="form-panel" id="panel-register">
      <div class="form-title">Create account</div>
      <div class="form-subtitle">Free forever, no credit card needed</div>
      <div class="alert error" id="register-error"></div>
      <div class="alert success" id="register-success"></div>
      <div class="field-row">
        <div class="field">
          <label>First Name</label>
          <input type="text" id="reg-first" placeholder="Alex"/>
        </div>
        <div class="field">
          <label>Last Name</label>
          <input type="text" id="reg-last" placeholder="Smith"/>
        </div>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min 8 characters" autocomplete="new-password"/>
      </div>
      <button class="btn-primary" id="register-btn" onclick="doRegister()">Create Account</button>
    </div>
  </div>
</div>

</body>
</html>
