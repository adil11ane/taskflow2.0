<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TaskFlow — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/dashboard.css">
<script src="js/dashboard.js" defer></script>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-dot"></div>
    TaskFlow
  </div>

  <div class="nav-section">
    <div class="nav-label">Overview</div>
    <button class="nav-item active" onclick="showView('dashboard')">
      <span class="icon">⊞</span> Dashboard
    </button>
  </div>

  <div class="nav-section">
    <div class="nav-label">Work</div>
    <button class="nav-item" onclick="showView('tasks')">
      <span class="icon">✓</span> Tasks
      <span class="badge" id="tasks-badge">0</span>
    </button>
    <button class="nav-item" onclick="showView('projects')">
      <span class="icon">◫</span> Projects
      <span class="badge" id="projects-badge">0</span>
    </button>
    <button class="nav-item" onclick="showView('comments')">
      <span class="icon">◎</span> Comments
      <span class="badge" id="comments-badge">0</span>
    </button>
  </div>

  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar" id="user-avatar">?</div>
      <div class="user-details">
        <div class="user-name" id="user-name">Loading…</div>
        <div class="user-email" id="user-email"></div>
      </div>
      <button class="logout-btn" onclick="doLogout()" title="Logout">⏻</button>
    </div>
  </div>
</nav>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div class="page-title" id="page-title">Dashboard</div>
    <div class="topbar-actions" id="topbar-actions"></div>
  </div>
  <div class="content">

    <!-- DASHBOARD VIEW -->
    <div class="view active" id="view-dashboard">
      <div class="stats-strip" id="stats-strip">
        <div class="stat-card"><div class="stat-label">Total Tasks</div><div class="stat-num accent" id="stat-total">—</div></div>
        <div class="stat-card"><div class="stat-label">In Progress</div><div class="stat-num warn" id="stat-progress">—</div></div>
        <div class="stat-card"><div class="stat-label">Done</div><div class="stat-num success" id="stat-done">—</div></div>
        <div class="stat-card"><div class="stat-label">Projects</div><div class="stat-num teal" id="stat-projects">—</div></div>
      </div>
      <div class="section-header">
        <div class="section-title">Kanban Board</div>
      </div>
      <div class="kanban" id="kanban-board">
        <div class="loading-center"><div class="spinner"></div>Loading…</div>
      </div>
    </div>

    <!-- TASKS VIEW -->
    <div class="view" id="view-tasks">
      <div class="table-wrap">
        <table class="list-table">
          <thead>
            <tr>
              <th>Title</th>
              <th>Project</th>
              <th>Priority</th>
              <th>Status</th>
              <th>Due Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tasks-tbody">
            <tr><td colspan="6"><div class="loading-center"><div class="spinner"></div>Loading…</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- PROJECTS VIEW -->
    <div class="view" id="view-projects">
      <div class="project-grid" id="projects-grid">
        <div class="loading-center"><div class="spinner"></div>Loading…</div>
      </div>
    </div>

    <!-- COMMENTS VIEW -->
    <div class="view" id="view-comments">
      <div id="comments-list">
        <div class="loading-center"><div class="spinner"></div>Loading…</div>
      </div>
    </div>

  </div>
</main>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toast-container"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <div class="modal-title">
      <span id="modal-title-text"></span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>
</body>
</html>
